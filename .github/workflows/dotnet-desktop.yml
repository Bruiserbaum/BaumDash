name: Build

on:
  push:
    branches: [ "main", "Dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build
      run: dotnet build WinUIAudioMixer/WinUIAudioMixer/WinUIAudioMixer.csproj -c Release

    - name: Publish
      run: >
        dotnet publish WinUIAudioMixer/WinUIAudioMixer/WinUIAudioMixer.csproj
        -c Release -r win-x64 --self-contained false
        -p:PublishSingleFile=true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: BaumDash-${{ github.ref_name }}-${{ github.sha }}
        path: WinUIAudioMixer/WinUIAudioMixer/bin/Release/net8.0-windows10.0.22621.0/win-x64/publish/WinUIAudioMixer.exe
